<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Audiobridge — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0c; height: 100%; }
  body { font-family: "IBM Plex Sans", system-ui, sans-serif; color: #e6e6ea; }
  #root { width: 100vw; height: 100vh; display: flex; }
  #root > * { flex: 1; min-width: 0; min-height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="mock-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="variation-a.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#ff8a3d",
  "density": 8,
  "show_events_rail": true,
  "show_system_card": true,
  "kpi_count": 6
}/*EDITMODE-END*/;

const ACCENT_OPTIONS = [
  "#ff8a3d", // amber (current)
  "#7c5cff", // electric purple
  "#22c55e", // green
  "#3da5ff", // blue
  "#e6e6ea", // monochrome
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty("--ab-accent", t.accent);
    const hex = t.accent.replace("#", "");
    const rr = parseInt(hex.substr(0,2),16), gg = parseInt(hex.substr(2,2),16), bb = parseInt(hex.substr(4,2),16);
    r.style.setProperty("--ab-accent-soft", `rgba(${rr},${gg},${bb},0.14)`);
    r.style.setProperty("--ab-accent-line", `rgba(${rr},${gg},${bb},0.35)`);
  }, [t.accent]);

  return (
    <>
      <VariationA
        density={t.density}
        showEventsRail={t.show_events_rail}
        showSystemCard={t.show_system_card}
        kpiCount={t.kpi_count}
      />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme">
          <TweakColor
            label="Accent"
            value={t.accent}
            options={ACCENT_OPTIONS}
            onChange={(v) => setTweak("accent", v)}
          />
        </TweakSection>

        <TweakSection label="Layout">
          <TweakSlider
            label="Row density"
            value={t.density}
            min={1} max={10} step={1}
            onChange={(v) => setTweak("density", v)}
          />
          <TweakSelect
            label="KPI tiles"
            value={String(t.kpi_count)}
            options={[
              { value: "4", label: "4 · essentials" },
              { value: "6", label: "6 · standard" },
            ]}
            onChange={(v) => setTweak("kpi_count", parseInt(v, 10))}
          />
          <TweakToggle
            label="Events rail"
            value={t.show_events_rail}
            onChange={(v) => setTweak("show_events_rail", v)}
          />
          <TweakToggle
            label="System card"
            value={t.show_system_card}
            onChange={(v) => setTweak("show_system_card", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
