schema_version = 1
endpoint_name = "Dante Bridge Endpoint"

[network]
signaling_port = 8443
srt_port = 9000
stun_servers = [
  "stun:stun.l.google.com:19302",
  "stun:stun.cloudflare.com:3478",
]

[audio]
interface_driver = "unknown"
sample_rate = 48000
channel_count = 8
channel_labels = [
  "Channel 1",
  "Channel 2",
  "Channel 3",
  "Channel 4",
  "Channel 5",
  "Channel 6",
  "Channel 7",
  "Channel 8",
]

[[sources]]
id = "src-1"
name = "Dante Input 1"
kind = "dante_input"
dante_channel = 1
enabled = true

[[sources]]
id = "src-silence"
name = "Silence"
kind = "silence"
enabled = true

[[encode_groups]]
id = "enc-main"
name = "Main Opus Pair"
channel_count = 2
enabled = true

[[encode_groups.channels]]
index = 1
source_id = "src-1"
label = "L"
gain_db = 0.0

[[encode_groups.channels]]
index = 2
source_id = "src-silence"
label = "R"
gain_db = 0.0

[encode_groups.opus]
bitrate_kbps = 96
frame_ms = 20
complexity = 7
inband_fec = true
expected_packet_loss_percent = 5

[[srt_transports]]
id = "srt-main"
name = "Main SRT Transport"
direction = "tx"
mode = "caller"
host = "198.51.100.10"
port = 9000
latency_ms = 240
encryption_enabled = true
encryption_strength = "aes-256"
encode_group_ids = ["enc-main"]
enabled = true

[[webrtc_streams]]
id = "wb-tb-1"
name = "Talkback 1"
direction = "tx"
source_id = "src-1"
enabled = true

[program]
enabled = false
srt_mode = "listener"
srt_latency_ms = 240
encryption_enabled = true
encryption_strength = "aes-256"
clock_recovery_mode = "adaptive"

[program.opus]
bitrate_kbps = 96
frame_ms = 20
complexity = 7
inband_fec = true
expected_packet_loss_percent = 5

[program.adaptive_clock]
convergence_window_seconds = 10
steady_window_seconds = 300
lock_ppm_threshold = 1.0
lock_hold_seconds = 30
ratio_clamp_ppm = 50.0

[program.free_running_clock]
jitter_buffer_ms = 500
underrun_policy = "silence"

[talkback]
enabled = false
output_channel = 1
opus_bitrate_kbps = 48
frame_ms = 10
restricted_lowdelay = false

[routes]
talkback_output_channel = 1

[pairing]

[ui]
theme = "dark"
meter_units = "dbfs"
meter_ballistics = "fast"
